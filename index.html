<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudioDrop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1e1e20; color: rgba(255,255,255,0.88);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.65; padding: 40px 20px 80px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
  .brand-dot { width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #7fb5b0, #1c2740); }
  .brand-name { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .updated { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 30px; }
  h2 { font-size: 16px; font-weight: 600; margin: 28px 0 8px; color: #8fb8f6; }
  p, li { font-size: 15px; color: rgba(255,255,255,0.72); margin-bottom: 12px; }
  ul { padding-left: 22px; }
  li { margin-bottom: 8px; }
  a { color: #8fb8f6; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .card { background: #2a2a2e; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 18px 20px; margin: 20px 0; }
  .footer { margin-top: 48px; font-size: 12px; color: rgba(255,255,255,0.3); }
  .footer a { color: rgba(255,255,255,0.45); }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="brand-dot"></div><span class="brand-name">StudioDrop</span></div>
  <h1>Studio product photos. One drag.</h1>
  <p>Batch background removal for online sellers — on your Mac, no subscription,
  yours forever.</p>
  <div class="card">
    <p style="margin:0"><a href="support.html">Support</a> &nbsp;·&nbsp;
    <a href="privacy.html">Privacy Policy</a></p>
  </div>
  <div class="footer">© 2026 StudioDrop</div>
</div>
</body>
</html>
